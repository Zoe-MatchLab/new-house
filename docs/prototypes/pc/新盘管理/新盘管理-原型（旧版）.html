<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新盘管理 - 新建房项目</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7f8fa; color: #1d2129; }
        
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e5e6eb; padding: 16px 0; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 56px; background: #fff; border-bottom: 1px solid #e5e6eb; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .content { flex: 1; padding: 24px; }
        
        .logo { padding: 0 16px 16px; border-bottom: 1px solid #e5e6eb; margin-bottom: 16px; font-size: 16px; font-weight: 600; color: #165dff; }
        .nav-item { padding: 12px 16px; color: #4e5969; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .nav-item:hover { background: #f7f8fa; }
        .nav-item.active { background: #e6f0ff; color: #165dff; font-weight: 500; }
        
        .header-title { font-size: 16px; font-weight: 500; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        /* 按钮 */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #165dff; color: #fff; }
        .btn-primary:hover { background: #4080ff; }
        .btn-primary:disabled { background: #c9d5f0; cursor: not-allowed; }
        .btn-default { background: #fff; border: 1px solid #e5e6eb; color: #4e5969; }
        .btn-default:hover { border-color: #165dff; color: #165dff; }
        .btn-danger { background: #fff; border: 1px solid #cf1322; color: #cf1322; }
        .btn-danger:hover { background: #cf1322; color: #fff; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        
        /* 搜索栏 */
        .search-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
        .search-input-wrapper { position: relative; flex: 1; max-width: 300px; }
        .search-input { width: 100%; padding: 8px 12px; border: 1px solid #e5e6eb; border-radius: 6px; font-size: 14px; padding-left: 36px; }
        .search-input:focus { outline: none; border-color: #165dff; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #86909c; }
        .search-loading { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
        .filter-select { padding: 8px 12px; border: 1px solid #e5e6eb; border-radius: 6px; font-size: 14px; background: #fff; min-width: 120px; }
        
        /* 表格 */
        .table-container { background: #fff; border-radius: 8px; overflow: hidden; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { background: #f7f8fa; padding: 12px 16px; text-align: left; font-size: 14px; font-weight: 500; color: #4e5969; border-bottom: 1px solid #e5e6eb; }
        .table td { padding: 16px; border-bottom: 1px solid #e5e6eb; font-size: 14px; }
        .table tr:hover { background: #f7f8fa; }
        .table tr:last-child td { border-bottom: none; }
        
        /* 状态标签 */
        .status { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 4px; font-size: 12px; gap: 4px; }
        .status-draft { background: #f2f3f5; color: #4e5969; }
        .status-pending { background: #fff7e6; color: #ff7d00; }
        .status-approved { background: #e6fff1; color: #00b42a; }
        .status-rejected { background: #fff1f0; color: #cf1322; }
        .status-online { background: #e6f0ff; color: #165dff; }
        .status-offline { background: #f2f3f5; color: #86909c; }
        
        .action-link { color: #165dff; margin-right: 16px; cursor: pointer; text-decoration: none; }
        .action-link:hover { text-decoration: underline; }
        
        /* 分页 */
        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 16px; }
        .pagination-info { font-size: 14px; color: #86909c; }
        .pagination-controls { display: flex; gap: 8px; }
        .pagination-btn { padding: 6px 12px; border: 1px solid #e5e6eb; background: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .pagination-btn:hover { border-color: #165dff; color: #165dff; }
        .pagination-btn.active { background: #165dff; color: #fff; border-color: #165dff; }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* ========== 加载状态 ========== */
        .skeleton { background: linear-gradient(90deg, #f2f3f5 25%, #e5e6eb 50%, #f2f3f5 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-row td { padding: 16px; }
        .skeleton-text { height: 14px; border-radius: 4px; }
        .skeleton-text-sm { height: 12px; width: 60%; }
        .skeleton-badge { height: 22px; width: 60px; border-radius: 4px; }
        .skeleton-btn { height: 28px; width: 50px; border-radius: 4px; }
        
        /* ========== 空数据状态 ========== */
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-size: 16px; color: #1d2129; margin-bottom: 8px; }
        .empty-desc { font-size: 14px; color: #86909c; margin-bottom: 20px; }
        
        /* ========== 错误状态 ========== */
        .error-state { text-align: center; padding: 60px 20px; }
        .error-icon { font-size: 64px; margin-bottom: 16px; }
        .error-title { font-size: 16px; color: #1d2129; margin-bottom: 8px; }
        .error-desc { font-size: 14px; color: #86909c; margin-bottom: 20px; }
        
        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; font-size: 14px; z-index: 9999; animation: toast-in 0.3s ease; }
        .toast-success { background: #e6fff1; color: #00b42a; border: 1px solid #00b42a; }
        .toast-error { background: #fff1f0; color: #cf1322; border: 1px solid #cf1322; }
        .toast-loading { background: #e6f0ff; color: #165dff; border: 1px solid #165dff; }
        @keyframes toast-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ========== 弹窗 ========== */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; border-radius: 8px; width: 600px; max-height: 80vh; overflow: auto; }
        .modal-header { padding: 16px 24px; border-bottom: 1px solid #e5e6eb; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 500; }
        .modal-close { width: 24px; height: 24px; cursor: pointer; color: #86909c; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid #e5e6eb; display: flex; justify-content: flex-end; gap: 12px; }
        
        /* ========== 表单 ========== */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .form-label .required { color: #cf1322; margin-left: 4px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #e5e6eb; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: #165dff; }
        .form-input.error { border-color: #cf1322; }
        .form-input:disabled { background: #f7f8fa; cursor: not-allowed; }
        .form-error { color: #cf1322; font-size: 12px; margin-top: 4px; display: none; }
        .form-error.show { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        /* ========== 图片上传 ========== */
        .upload-area { border: 2px dashed #e5e6eb; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .upload-area:hover { border-color: #165dff; }
        .upload-area.dragover { border-color: #165dff; background: #f0f5ff; }
        .upload-icon { font-size: 48px; color: #86909c; margin-bottom: 16px; }
        .upload-text { font-size: 14px; color: #4e5969; }
        .upload-hint { font-size: 12px; color: #86909c; margin-top: 8px; }
        
        /* 上传进度 */
        .upload-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: #e5e6eb; border-radius: 0 0 8px 8px; overflow: hidden; }
        .upload-progress-bar { height: 100%; background: #165dff; transition: width 0.3s; }
        
        /* 上传失败状态 */
        .upload-error { border-color: #cf1322; }
        .upload-error .upload-icon { color: #cf1322; }
        .upload-retry { color: #165dff; cursor: pointer; margin-top: 8px; display: inline-block; }
        
        /* ========== Tabs ========== */
        .tabs { display: flex; gap: 24px; border-bottom: 1px solid #e5e6eb; margin-bottom: 24px; }
        .tab { padding: 12px 0; font-size: 14px; color: #4e5969; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab:hover { color: #1d2129; }
        .tab.active { color: #165dff; border-bottom-color: #165dff; font-weight: 500; }
        
        /* ========== 图片预览 ========== */
        .image-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 16px; }
        .image-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #f7f8fa; }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-item.loading { display: flex; align-items: center; justify-content: center; }
        .image-loading-spinner { width: 24px; height: 24px; border: 2px solid #e5e6eb; border-top-color: #165dff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .image-delete { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .image-item:hover .image-delete { opacity: 1; }
        
        /* ========== 确认弹窗 ========== */
        .confirm-modal { width: 400px; }
        .confirm-content { text-align: center; padding: 24px; }
        .confirm-icon { font-size: 48px; margin-bottom: 16px; }
        .confirm-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .confirm-desc { font-size: 14px; color: #86909c; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">🏠 新房项目</div>
            <div class="nav-item active">📦 新盘管理</div>
            <div class="nav-item">📋 探盘任务</div>
            <div class="nav-item">🎓 能力提升</div>
            <div class="nav-item">🎙️ 录音分析</div>
            <div class="nav-item">📁 物料管理</div>
            <div class="nav-item">📊 数据看板</div>
            <div class="nav-item">👥 团队管理</div>
        </div>
        
        <div class="main">
            <div class="header">
                <div class="header-title">新盘管理</div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openModal()">+ 新建楼盘</button>
                </div>
            </div>
            
            <div class="content">
                <!-- 搜索筛选栏 -->
                <div class="search-bar">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" placeholder="搜索楼盘名称/地址" id="searchInput" oninput="handleSearch()">
                        <span class="search-loading" id="searchLoading" style="display: none;">⏳</span>
                    </div>
                    <select class="filter-select" id="statusFilter" onchange="handleFilter()">
                        <option value="">全部状态</option>
                        <option value="draft">草稿</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已驳回</option>
                        <option value="online">已上线</option>
                        <option value="offline">已下线</option>
                    </select>
                    <select class="filter-select" id="districtFilter" onchange="handleFilter()">
                        <option value="">全部区域</option>
                        <option value="chaoyang">朝阳区</option>
                        <option value="haidian">海淀区</option>
                        <option value="xicheng">西城区</option>
                        <option value="dongcheng">东城区</option>
                    </select>
                </div>
                
                <!-- 表格容器 -->
                <div class="table-container" id="tableContainer">
                    <!-- 动态内容 -->
                </div>
                
                <!-- 分页 -->
                <div class="pagination">
                    <div class="pagination-info">共 <span id="totalCount">0</span> 条记录</div>
                    <div class="pagination-controls" id="paginationControls">
                        <!-- 动态分页 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 新建/编辑弹窗 -->
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">新建楼盘</div>
                <span class="modal-close" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body">
                <form id="propertyForm" onsubmit="handleSubmit(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">楼盘名称 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="propertyName" placeholder="请输入楼盘名称" required>
                            <div class="form-error" id="nameError">请输入楼盘名称</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">楼盘别名</label>
                            <input type="text" class="form-input" id="propertyAlias" placeholder="请输入楼盘别名">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">楼盘地址 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="propertyAddress" placeholder="请输入详细地址" required>
                        <div class="form-error" id="addressError">请输入楼盘地址</div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">均价(元/㎡) <span class="required">*</span></label>
                            <input type="number" class="form-input" id="propertyPrice" placeholder="请输入均价" required>
                            <div class="form-error" id="priceError">请输入有效的均价</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">总价区间(万元)</label>
                            <input type="text" class="form-input" id="priceRange" placeholder="如: 500-800">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">开发商</label>
                            <input type="text" class="form-input" id="developer" placeholder="请输入开发商名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">物业公司</label>
                            <input type="text" class="form-input" id="propertyCompany" placeholder="请输入物业公司">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">建筑面积(㎡)</label>
                            <input type="number" class="form-input" id="buildingArea" placeholder="如: 120000">
                        </div>
                        <div class="form-group">
                            <label class="form-label">绿化率</label>
                            <input type="text" class="form-input" id="greeningRate" placeholder="如: 35%">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">楼盘亮点</label>
                        <input type="text" class="form-input" id="highlights" placeholder="请输入楼盘亮点，多个用逗号分隔">
                    </div>
                    
                    <!-- Tab切换 -->
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('basic')">基本信息</div>
                        <div class="tab" onclick="switchTab('images')">楼盘图片</div>
                        <div class="tab" onclick="switchTab('units')">户型信息</div>
                    </div>
                    
                    <!-- 基本信息Tab -->
                    <div id="basicTab">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">开盘时间</label>
                                <input type="date" class="form-input" id="openDate">
                            </div>
                            <div class="form-group">
                                <label class="form-label">交房时间</label>
                                <input type="date" class="form-input" id="deliveryDate">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 楼盘图片Tab -->
                    <div id="imagesTab" style="display: none;">
                        <div class="upload-area" id="uploadArea" onclick="triggerUpload()">
                            <div class="upload-icon">📤</div>
                            <div class="upload-text">点击或拖拽上传图片</div>
                            <div class="upload-hint">支持 JPG、PNG，大小不超过 10MB</div>
                        </div>
                        <div class="image-grid" id="imageGrid">
                            <!-- 上传的图片将显示在这里 -->
                        </div>
                    </div>
                    
                    <!-- 户型信息Tab -->
                    <div id="unitsTab" style="display: none;">
                        <button type="button" class="btn btn-default" onclick="addUnit()" style="margin-bottom: 16px;">+ 添加户型</button>
                        <div id="unitsList">
                            <!-- 户型列表 -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary" id="submitBtn" form="propertyForm">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal confirm-modal">
            <div class="modal-body">
                <div class="confirm-content">
                    <div class="confirm-icon">⚠️</div>
                    <div class="confirm-title">确认删除</div>
                    <div class="confirm-desc">删除后数据无法恢复，确定要删除吗？</div>
                </div>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button type="button" class="btn btn-default" onclick="closeDeleteModal()">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>
    
    <!-- Toast容器 -->
    <div id="toastContainer"></div>
    
    <script>
        // 状态管理
        let currentState = 'loading'; // loading | data | empty | error
        let currentPage = 1;
        let pageSize = 10;
        let total = 0;
        let deleteTargetId = null;
        let searchTimeout = null;
        
        // Mock数据
        const mockData = [
            { id: 1, name: '龙湖·云景', address: '朝阳区东四环', price: 85000, status: 'online', developer: '龙湖集团', updateTime: '2026-04-10' },
            { id: 2, name: '万科·翡翠公园', address: '海淀区西北旺', price: 78000, status: 'pending', developer: '万科地产', updateTime: '2026-04-12' },
            { id: 3, name: '中海·寰宇天下', address: '西城区金融街', price: 120000, status: 'approved', developer: '中海地产', updateTime: '2026-04-11' },
            { id: 4, name: '华润·橡树湾', address: '东城区王府井', price: 95000, status: 'draft', developer: '华润置地', updateTime: '2026-04-09' },
            { id: 5, name: '保利·中央公园', address: '朝阳区望京', price: 88000, status: 'rejected', developer: '保利发展', updateTime: '2026-04-08' },
        ];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
        
        // 加载数据
        function loadData() {
            currentState = 'loading';
            renderTable();
            
            // 模拟API请求
            setTimeout(() => {
                total = mockData.length;
                currentState = total > 0 ? 'data' : 'empty';
                renderTable();
            }, 800);
        }
        
        // 渲染表格
        function renderTable() {
            const container = document.getElementById('tableContainer');
            document.getElementById('totalCount').textContent = total;
            
            if (currentState === 'loading') {
                container.innerHTML = renderLoadingState();
            } else if (currentState === 'empty') {
                container.innerHTML = renderEmptyState();
            } else if (currentState === 'error') {
                container.innerHTML = renderErrorState();
            } else {
                container.innerHTML = renderDataState();
            }
            
            renderPagination();
        }
        
        // 加载状态
        function renderLoadingState() {
            let html = `<table class="table"><thead><tr>`;
            html += `<th>楼盘名称</th><th>地址</th><th>均价</th><th>开发商</th><th>状态</th><th>更新时间</th><th>操作</th>`;
            html += `</tr></thead><tbody>`;
            
            for (let i = 0; i < 5; i++) {
                html += `<tr class="skeleton-row">`;
                html += `<td><div class="skeleton skeleton-text"></div></td>`;
                html += `<td><div class="skeleton skeleton-text skeleton-text-sm"></div></td>`;
                html += `<td><div class="skeleton skeleton-text skeleton-text-sm"></div></td>`;
                html += `<td><div class="skeleton skeleton-text skeleton-text-sm"></div></td>`;
                html += `<td><div class="skeleton skeleton-badge"></div></td>`;
                html += `<td><div class="skeleton skeleton-text skeleton-text-sm"></div></td>`;
                html += `<td><div class="skeleton skeleton-btn"></div></td>`;
                html += `</tr>`;
            }
            
            html += `</tbody></table>`;
            return html;
        }
        
        // 空数据状态
        function renderEmptyState() {
            return `
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <div class="empty-title">暂无楼盘数据</div>
                    <div class="empty-desc">点击"新建楼盘"按钮添加第一个楼盘</div>
                    <button class="btn btn-primary" onclick="openModal()">+ 新建楼盘</button>
                </div>
            `;
        }
        
        // 错误状态
        function renderErrorState() {
            return `
                <div class="error-state">
                    <div class="error-icon">❌</div>
                    <div class="error-title">数据加载失败</div>
                    <div class="error-desc">网络连接异常，请检查网络后重试</div>
                    <button class="btn btn-primary" onclick="loadData()">重新加载</button>
                </div>
            `;
        }
        
        // 数据状态
        function renderDataState() {
            let html = `<table class="table"><thead><tr>`;
            html += `<th>楼盘名称</th><th>地址</th><th>均价(元/㎡)</th><th>开发商</th><th>状态</th><th>更新时间</th><th>操作</th>`;
            html += `</tr></thead><tbody>`;
            
            mockData.forEach(item => {
                const statusMap = {
                    'draft': '<span class="status status-draft">草稿</span>',
                    'pending': '<span class="status status-pending">待审核</span>',
                    'approved': '<span class="status status-approved">已通过</span>',
                    'rejected': '<span class="status status-rejected">已驳回</span>',
                    'online': '<span class="status status-online">已上线</span>',
                    'offline': '<span class="status status-offline">已下线</span>'
                };
                
                html += `<tr>`;
                html += `<td><strong>${item.name}</strong></td>`;
                html += `<td>${item.address}</td>`;
                html += `<td>${item.price.toLocaleString()}</td>`;
                html += `<td>${item.developer}</td>`;
                html += `<td>${statusMap[item.status]}</td>`;
                html += `<td>${item.updateTime}</td>`;
                html += `<td>
                    <a class="action-link" onclick="editProperty(${item.id})">编辑</a>
                    <a class="action-link" onclick="openDeleteModal(${item.id})" style="color: #cf1322;">删除</a>
                </td>`;
                html += `</tr>`;
            });
            
            html += `</tbody></table>`;
            return html;
        }
        
        // 渲染分页
        function renderPagination() {
            const container = document.getElementById('paginationControls');
            const totalPages = Math.ceil(total / pageSize) || 1;
            
            let html = `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="padding: 6px;">...</span>`;
                }
            }
            
            html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
            
            container.innerHTML = html;
        }
        
        // 翻页
        function goToPage(page) {
            currentPage = page;
            loadData();
        }
        
        // 搜索（防抖）
        function handleSearch() {
            const loading = document.getElementById('searchLoading');
            loading.style.display = 'block';
            
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loading.style.display = 'none';
                loadData();
            }, 300);
        }
        
        // 筛选
        function handleFilter() {
            loadData();
        }
        
        // 打开弹窗
        function openModal(id = null) {
            document.getElementById('formModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = id ? '编辑楼盘' : '新建楼盘';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '保存';
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('formModal').style.display = 'none';
            document.getElementById('propertyForm').reset();
            clearFormErrors();
        }
        
        // Tab切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('basicTab').style.display = tabName === 'basic' ? 'block' : 'none';
            document.getElementById('imagesTab').style.display = tabName === 'images' ? 'block' : 'none';
            document.getElementById('unitsTab').style.display = tabName === 'units' ? 'block' : 'none';
        }
        
        // 表单校验
        function validateForm() {
            let isValid = true;
            clearFormErrors();
            
            const name = document.getElementById('propertyName');
            const address = document.getElementById('propertyAddress');
            const price = document.getElementById('propertyPrice');
            
            if (!name.value.trim()) {
                showFormError('propertyName', 'nameError');
                isValid = false;
            }
            
            if (!address.value.trim()) {
                showFormError('propertyAddress', 'addressError');
                isValid = false;
            }
            
            if (!price.value || price.value <= 0) {
                showFormError('propertyPrice', 'priceError');
                isValid = false;
            }
            
            return isValid;
        }
        
        function showFormError(inputId, errorId) {
            document.getElementById(inputId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }
        
        function clearFormErrors() {
            document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));
            document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
        }
        
        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>保存中...</span>';
            
            // 模拟API请求
            setTimeout(() => {
                closeModal();
                showToast('保存成功', 'success');
                loadData();
            }, 1500);
        }
        
        // 编辑
        function editProperty(id) {
            openModal(id);
            // 填充数据...
        }
        
        // 删除弹窗
        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').style.display = 'flex';
        }
        
        function closeDeleteModal() {
            deleteTargetId = null;
            document.getElementById('deleteModal').style.display = 'none';
        }
        
        // 确认删除
        function confirmDelete() {
            const btn = document.getElementById('confirmDeleteBtn');
            btn.disabled = true;
            btn.textContent = '删除中...';
            
            setTimeout(() => {
                closeDeleteModal();
                showToast('删除成功', 'success');
                loadData();
            }, 1000);
        }
        
        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 触发上传
        function triggerUpload() {
            // 实际应该打开文件选择器
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.classList.add('uploading');
            uploadArea.innerHTML = `
                <div class="upload-icon">⏳</div>
                <div class="upload-text">上传中...</div>
                <div class="upload-progress"><div class="upload-progress-bar" style="width: 0%"></div></div>
            `;
            
            // 模拟上传进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                const bar = uploadArea.querySelector('.upload-progress-bar');
                if (bar) bar.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    uploadArea.classList.remove('uploading');
                    uploadArea.innerHTML = `
                        <div class="upload-icon">📤</div>
                        <div class="upload-text">点击或拖拽上传图片</div>
                        <div class="upload-hint">支持 JPG、PNG，大小不超过 10MB</div>
                    `;
                    showToast('上传成功', 'success');
                }
            }, 200);
        }
        
        // 添加户型
        function addUnit() {
            showToast('添加户型功能', 'loading');
        }
    </script>
</body>
</html>
